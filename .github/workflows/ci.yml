name: CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm run verify
        env:
          # CI placeholders only. Real frontend/backend deployments use Vercel
          # and Railway environment variables.
          NEXT_PUBLIC_AGORA_APP_ID: 00000000000000000000000000000000
          NEXT_AGORA_APP_CERTIFICATE: 00000000000000000000000000000000
          NEXT_PUBLIC_MATCH_FEED_UID: 234567
          AGENT_BACKEND_URL: http://localhost:8000
          BACKEND_API_SECRET: ci-backend-secret
          ACCESS_PASSWORD: ci-access-password

  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: python -m pip install --upgrade pip
      - run: pip install -r requirements-dev.txt
      - run: pytest
